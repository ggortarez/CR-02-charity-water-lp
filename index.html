<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Charity: Water</title>
<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<header>
    <img src="logo.png" alt="Charity Water Logo" class="logo">

    <a href="https://www.charitywater.org/donate"
       target="_blank"
       class="nav-btn">
       Join The Movement 💧
    </a>
</header>

<section class="hero">

    <div class="overlay"></div>

    <div class="hero-content">

        <h1>Every Drop Creates Opportunity</h1>

        <p>
            Every donation helps bring clean water to communities in need
            and gives students a chance to be part of something bigger.
        </p>

        <div class="cta-group">

            <a href="https://www.charitywater.org/donate"
               target="_blank"
               class="donate-btn">
               Donate Now 💧
            </a>

        </div>

        <span class="tagline">
            A Drop A Day Can Go A Long Way
        </span>

    </div>

</section>

</body>
</html>
